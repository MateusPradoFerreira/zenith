<div [class]="hlm('px-6 py-4', class)">
  <hlm-data-table header="Despesas" [values]="values" [columns]="columns" [actionFn]="actionFn" (onSelect)="onSelect($event)">
    <ng-template hlmTemplate="action" let-selection="selection">
      <button hlmBtn size="icon" variant="secondary" hlmBtnIcon="rotate-ccw" [hlmBtnLoading]="loading" [disabled]="loading" (click)="updateUI()"></button>
      <brn-popover>
        <button hlmBtn size="icon" variant="secondary" hlmBtnIcon="funnel-plus" brnPopoverTrigger></button>
        <form hlmPopoverContent *brnPopoverContent="let ctx" class="mt-1 grid grid-cols-2 gap-2" [formGroup]="filter.fb" (ngSubmit)="updateUI()">
          <div class="col-span-2 hlm-float-label">
            <hlm-date-picker formControlName="startsAt">Selecione uma Data</hlm-date-picker>
            <label>Início</label>
          </div>
          <div class="col-span-2 hlm-float-label">
            <hlm-date-picker formControlName="endsAt">Selecione uma Data</hlm-date-picker>
            <label>Fim</label>
          </div>
          <button hlmBtn variant="secondary" type="button" (click)="clearFilter(); ctx.close()">Limpar</button>
          <button hlmBtn (click)="ctx.close()">Aplicar</button>
        </form>
      </brn-popover>
      <button hlmBtn hlmBtnIcon="plus" (click)="onCreate()">Adicionar</button>
    </ng-template>
    <ng-template hlmTemplate="row" let-rowData>
      <hlm-td class="w-40">{{ rowData.docNumber }}</hlm-td>
      <hlm-td class="flex-1">{{ rowData.name }}</hlm-td>
      <hlm-td class="w-40">{{ rowData.createdAt | date: "dd/MM/YYYY" }}</hlm-td>
      <hlm-td class="w-40">{{ rowData.dueAt | date: "dd/MM/YYYY" }}</hlm-td>
      <hlm-td class="w-40 py-0" *ngIf="rowData.status === 'PENDING'"> <span hlmBadge severity="warn">Pendente</span> </hlm-td>
      <hlm-td class="w-40 py-0" *ngIf="rowData.status === 'PAID'"> <span hlmBadge severity="success">Pago</span> </hlm-td>
      <hlm-td class="w-40 py-0" *ngIf="rowData.status === 'OVERDUE'"> <span hlmBadge severity="danger">Vencido</span> </hlm-td>
      <hlm-td class="w-40 py-0" *ngIf="rowData.status === 'CANCELED'"> <span hlmBadge severity="danger">Cancelado</span> </hlm-td>
      <hlm-td class="justify-end w-40">{{ rowData.value | currency: "BRL" }}</hlm-td> 
    </ng-template>
  </hlm-data-table>
</div>
