<form class="px-6 py-4 grid grid-cols-12 gap-2" [formGroup]="form.fb" (ngSubmit)="onSubmit()">
  <div class="col-span-12 hlm-float-label">
    <input hlmInput formControlName="name"/>
    <label>Nome</label>
  </div>
  <div class="col-span-8"></div>
  <button class="col-span-2" hlmBtn variant="secondary" type="button" (click)="back()">Voltar</button>
  <button class="col-span-2" hlmBtn>Salvar</button>
</form>
