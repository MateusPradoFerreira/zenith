<header class="h-full border-b border-slate-200 flex items-center justify-between gap-4 px-6">
  <div class="flex items-center gap-2">
    <img class="w-12 h-12 object-cover rounded-full border border-slate-200 shrink-0" [src]="userData().avatar" alt="profile-picture">
    <div class="overflow-hidden">
      <div class="truncate text-sm">{{userData().name}}</div>
      <div class="truncate text-xs text-slate-600">{{userData().email}}</div>
    </div>
  </div>
  <div class="flex items-center gap-1">
    <button hlmBtn hlmBtnIcon="search" size="icon-lg" variant="ghost"></button>
    <button hlmBtn hlmBtnIcon="archive" size="icon-lg" variant="ghost"></button>
    <button hlmBtn hlmBtnIcon="folder-closed" size="icon-lg" variant="ghost"></button>
    <button hlmBtn hlmBtnIcon="square-kanban" size="icon-lg" variant="ghost"></button>
    <button hlmBtn hlmBtnIcon="calendar" size="icon-lg" variant="ghost"></button>
    <button hlmBtn hlmBtnIcon="chart-pie" size="icon-lg" variant="ghost"></button>
    <div class="mx-1 h-6 w-0.5 bg-slate-200 rounded"></div>
    <button hlmBtn hlmBtnIcon="bell" size="icon-lg" variant="ghost"></button>
    <button hlmBtn hlmBtnIcon="settings" size="icon-lg" variant="ghost"></button>
  </div>
</header>
